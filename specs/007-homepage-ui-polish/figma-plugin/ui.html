<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17373a;
        background: #f6fbfa;
      }

      body {
        margin: 0;
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.35;
      }

      p {
        margin: 0 0 14px;
        color: #506765;
        font-size: 13px;
        line-height: 1.6;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 260px;
        padding: 12px;
        border: 1px solid #dbe9e7;
        border-radius: 8px;
        color: #17373a;
        background: #ffffff;
        font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        height: 34px;
        padding: 0 14px;
        border: 1px solid #c8dcda;
        border-radius: 8px;
        color: #17373a;
        background: #ffffff;
        font-size: 13px;
        cursor: pointer;
      }

      button.primary {
        border-color: #006870;
        color: #ffffff;
        background: #006870;
      }

      .error {
        color: #8a1f14;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Homepage UI Polish 007 生成中</h1>
    <p id="hint">运行完成后，把下面的节点信息回填到 figma.md 或发给 Codex。</p>
    <textarea id="report" readonly>正在创建 Figma 节点...</textarea>
    <div class="actions">
      <button class="primary" id="copy">复制节点信息</button>
      <button id="close">关闭插件</button>
    </div>

    <script>
      const title = document.getElementById("title");
      const hint = document.getElementById("hint");
      const report = document.getElementById("report");

      onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "complete") {
          title.textContent = "Homepage UI Polish 007 已生成";
          hint.textContent = "请把节点信息回填到 specs/007-homepage-ui-polish/figma.md。";
          report.value = message.report;
        }

        if (message.type === "error") {
          title.textContent = "生成失败";
          title.className = "error";
          hint.textContent = "请把错误信息发给 Codex，我会修正插件脚本。";
          report.value = message.error;
        }
      };

      document.getElementById("copy").onclick = async () => {
        report.select();
        try {
          await navigator.clipboard.writeText(report.value);
        } catch {
          document.execCommand("copy");
        }
      };

      document.getElementById("close").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };
    </script>
  </body>
</html>
