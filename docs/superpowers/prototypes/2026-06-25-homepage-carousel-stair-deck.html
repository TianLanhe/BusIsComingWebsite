<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Homepage Carousel Stair Deck Prototype</title>
  <style>
    :root {
      color-scheme: light;
      --brand: #006064;
      --ink: #073f45;
      --muted: #46666b;
      --border: #d8e8e8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f6fbfa;
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 820px;
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }

    .final-wrap {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(390px, 1.1fr);
      gap: 38px;
      align-items: center;
    }

    .copy-panel h2 {
      margin: 0 0 14px;
      max-width: 440px;
      font-size: 42px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--ink);
    }

    .copy-panel p {
      max-width: 470px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }

    .scene-dots {
      display: inline-flex;
      gap: 8px;
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid #d7e6e7;
      border-radius: 999px;
      background: #fff;
    }

    .scene-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 0;
      background: #bed4d7;
    }

    .scene-dot.active {
      width: 30px;
      background: var(--brand);
    }

    .rules {
      margin-top: 18px;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      color: #385d62;
    }

    .rules strong {
      color: var(--ink);
    }

    .stage {
      position: relative;
      min-height: 610px;
      display: grid;
      place-items: center;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 52%, rgba(0, 96, 100, 0.12), transparent 45%),
        linear-gradient(180deg, #f9fcfc, #eef7f6);
      overflow: hidden;
    }

    .deck {
      position: relative;
      width: 360px;
      height: 540px;
    }

    .baseline {
      position: absolute;
      left: 38px;
      right: 38px;
      bottom: 68px;
      height: 1px;
      border-top: 1px dashed rgba(0, 96, 100, 0.30);
      z-index: 8;
      pointer-events: none;
    }

    .baseline span {
      position: absolute;
      right: 0;
      top: 8px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      color: #5b777c;
      font-size: 12px;
    }

    .card-shot {
      position: absolute;
      left: 50%;
      width: 236px;
      aspect-ratio: 9 / 18;
      overflow: hidden;
      border: 1px solid rgba(8, 86, 92, 0.22);
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 20px 46px rgba(15, 45, 50, 0.18);
      transform-origin: 50% 100%;
      cursor: pointer;
      transition: transform 360ms ease, opacity 260ms ease, filter 260ms ease, box-shadow 260ms ease;
    }

    .card-shot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .card-shot.main {
      z-index: 5;
      bottom: 68px;
      opacity: 1;
      transform: translateX(-50%) scale(1) rotate(0deg);
      box-shadow: 0 30px 72px rgba(15, 45, 50, 0.27);
    }

    .card-shot.back-left {
      z-index: 3;
      bottom: 82px;
      opacity: 0.78;
      filter: saturate(0.94);
      transform: translateX(calc(-50% - 44px)) scale(0.92) rotate(-5deg);
    }

    .card-shot.back-right {
      z-index: 2;
      bottom: 84px;
      opacity: 0.70;
      filter: saturate(0.88);
      transform: translateX(calc(-50% + 50px)) scale(0.86) rotate(5deg);
    }

    .card-shot.back-left:hover,
    .card-shot.back-right:hover,
    .card-shot.back-left:focus-visible,
    .card-shot.back-right:focus-visible {
      opacity: 0.96;
      filter: none;
      outline: none;
      box-shadow: 0 24px 58px rgba(0, 96, 100, 0.25);
    }

    .hit-note {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: max-content;
      max-width: calc(100% - 28px);
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: #375c61;
      font-size: 13px;
      box-shadow: 0 10px 26px rgba(15, 45, 50, 0.12);
    }

    @media (max-width: 860px) {
      main {
        width: min(390px, calc(100% - 28px));
        padding-top: 28px;
      }

      .final-wrap {
        grid-template-columns: 1fr;
      }

      .copy-panel h2 {
        font-size: 32px;
      }

      .stage {
        min-height: 500px;
      }

      .deck {
        width: 316px;
        height: 440px;
      }

      .baseline,
      .card-shot.main {
        bottom: 58px;
      }

      .card-shot {
        width: 190px;
        border-radius: 23px;
      }

      .card-shot.back-left {
        bottom: 68px;
        transform: translateX(calc(-50% - 34px)) scale(0.92) rotate(-4deg);
      }

      .card-shot.back-right {
        bottom: 70px;
        transform: translateX(calc(-50% + 36px)) scale(0.86) rotate(4deg);
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>低旋转阶梯牌堆原型</h1>
    <p class="subtitle">桌面后方图片使用 5 度旋转；后方卡片按底部定位并上提，确保视觉上不低于主图底部。手机端收敛到约 4 度。虚线是评审辅助，生产页面不显示。</p>

    <div class="final-wrap">
      <div class="copy-panel">
        <h2>Saved Citybus routes in one tap</h2>
        <p>功能场景文案保持在旁边。场景切换靠点点；同场景图片只在牌堆里切换。</p>
        <div class="scene-dots" aria-label="功能场景切换点">
          <button class="scene-dot active" title="常用路线"></button>
          <button class="scene-dot" title="路线比较"></button>
          <button class="scene-dot" title="抵站时间"></button>
          <button class="scene-dot" title="出门前监测"></button>
        </div>
        <div class="rules">
          <p><strong>定位规则：</strong>主图底部为基线；后方图片用 <code>bottom</code> 定位并上提，抵消旋转角带来的视觉下探。</p>
          <p><strong>交互规则：</strong>点击后方任意截图，它升到最上层；点击点点才切换功能场景。</p>
        </div>
      </div>

      <div class="stage">
        <div class="deck" id="stairDeck">
          <div class="baseline"><span>主图底部基线</span></div>
          <button class="card-shot main" data-card="0" aria-label="当前主图：常用路线截图 1">
            <img src="../../../frontend/src/assets/app-screenshots/real/favorite-citybus-routes-1.jpg" alt="">
          </button>
          <button class="card-shot back-left" data-card="1" aria-label="切换到常用路线截图 2">
            <img src="../../../frontend/src/assets/app-screenshots/real/favorite-citybus-routes-2.jpg" alt="">
          </button>
          <button class="card-shot back-right" data-card="2" aria-label="切换到常用路线截图 3">
            <img src="../../../frontend/src/assets/app-screenshots/real/favorite-citybus-routes-3.jpg" alt="">
          </button>
        </div>
        <div class="hit-note">点击后方露出的图片，切换为主图</div>
      </div>
    </div>
  </main>

  <script>
    const deck = document.getElementById("stairDeck");
    const classes = ["main", "back-left", "back-right"];
    const cards = Array.from(deck.querySelectorAll(".card-shot"));
    let order = [0, 1, 2];

    function render() {
      order.forEach((cardIndex, position) => {
        cards[cardIndex].className = `card-shot ${classes[position]}`;
      });
    }

    cards.forEach((card, cardIndex) => {
      card.addEventListener("click", () => {
        order = [cardIndex, ...order.filter((index) => index !== cardIndex)];
        render();
      });
    });
  </script>
</body>
</html>
